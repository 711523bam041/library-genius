{% extends "base.html" %}

{% block title %}Add Book - LibraryGenius{% endblock %}

{% block content %}
<div class="container">
    <div class="row mb-4">
        <div class="col-12">
            <h2 class="fw-bold"><i class="fas fa-plus-circle me-2"></i>Add New Book</h2>
        </div>
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form id="addBookForm">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="title" class="form-label">Title *</label>
                                <input type="text" class="form-control" id="title" name="title" required>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="author" class="form-label">Author *</label>
                                <input type="text" class="form-control" id="author" name="author" required>
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="isbn" class="form-label">ISBN</label>
                                <div class="input-group">
                                    <input type="text" class="form-control" id="isbn" name="isbn" placeholder="ISBN-10 or ISBN-13">
                                    <button class="btn btn-outline-secondary" type="button" id="fetchBookBtn" title="Fetch from Google Books">
                                        <i class="fas fa-cloud-download-alt"></i> Fetch
                                    </button>
                                </div>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="publisher" class="form-label">Publisher</label>
                                <input type="text" class="form-control" id="publisher" name="publisher">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="category" class="form-label">Category</label>
                                <input type="text" class="form-control" id="category" name="category">
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label for="shelf_location" class="form-label">Shelf Location</label>
                                <input type="text" class="form-control" id="shelf_location" name="shelf_location">
                            </div>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="copies" class="form-label">Number of Copies</label>
                                <input type="number" class="form-control" id="copies" name="copies" value="1" min="1">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="cover_image_url" class="form-label">Cover Image URL</label>
                            <input type="url" class="form-control" id="cover_image_url" name="cover_image_url">
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">
                                <i class="fas fa-save me-2"></i>Add Book
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <!-- ISBN Scanner -->
            <div class="card mb-3">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-barcode me-2"></i>ISBN Scanner</h5>
                </div>
                <div class="card-body">
                    <div class="scanner-area mb-3" id="scannerArea">
                        <i class="fas fa-camera d-block"></i>
                        <p class="mb-0">Upload barcode image</p>
                        <input type="file" id="isbnFileInput" accept="image/*" style="display: none;">
                    </div>
                    <button class="btn btn-outline-primary w-100" id="scanIsbnBtn">
                        <i class="fas fa-upload me-2"></i>Upload Barcode Image
                    </button>
                    <div id="scanResult" class="mt-3"></div>
                </div>
            </div>

            <!-- AI Features -->
            <div class="card">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0"><i class="fas fa-robot me-2"></i>AI Assistant</h5>
                </div>
                <div class="card-body">
                    <button class="btn btn-outline-success w-100 mb-2" id="generateSummaryBtn" disabled>
                        <i class="fas fa-magic me-2"></i>Generate Summary
                    </button>
                    <button class="btn btn-outline-info w-100" id="suggestGenresBtn" disabled>
                        <i class="fas fa-tags me-2"></i>Suggest Genres
                    </button>
                    <div id="aiResult" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='js/scanner.js') }}"></script>
<script src="{{ url_for('static', filename='js/ai.js') }}"></script>
<script src="{{ url_for('static', filename='js/books.js') }}"></script>
{% endblock %}
